name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: black
        run: python -m black --check .

      - name: flake8
        run: python -m flake8 .

      - name: mypy
        run: python -m mypy src tests

      - name: pylint
        run: python -m pylint src tests

      - name: bandit
        run: python -m bandit -r src

      - name: pytest (coverage ≥ 90 %)
        run: python -m pytest

  package:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.0.0,<2.0.0"

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-py311
          path: dist/*
          if-no-files-found: error
