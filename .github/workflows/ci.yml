name: CI

# Déclenché uniquement par la publication d’un tag de version sur le dépôt.
# Le commit pointé par le tag doit être dans l’historique de `main` (voir job verify).

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    name: Verify tag commit on main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is an ancestor of origin/main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "::error::Le commit étiqueté n'est pas dans l'historique de main. Tags uniquement sur main."
            exit 1
          fi
          echo "OK: ${{ github.sha }} est ancêtre de origin/main."

  quality:
    name: Quality (Python ${{ matrix.python-version }})
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: black
        run: python -m black --check .

      - name: flake8
        run: python -m flake8 .

      - name: mypy
        run: python -m mypy src tests

      - name: pylint
        run: python -m pylint src tests

      - name: bandit
        run: python -m bandit -r src

      - name: pytest (coverage ≥ 90 %)
        run: python -m pytest

  release:
    name: GitHub Release
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.0.0,<2.0.0"

      - name: Build sdist and wheel
        run: python -m build

      - name: Create GitHub Release with distributions
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
